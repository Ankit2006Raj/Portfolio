<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e2a"/>
      <stop offset="100%" stop-color="#070b1a"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0feffd"/>
      <stop offset="100%" stop-color="#aa00ff"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>
  
  <!-- Face recognition outline -->
  <rect x="175" y="100" width="250" height="200" fill="none" stroke="url(#highlight)" stroke-width="2" rx="5"/>
  
  <!-- Face outline -->
  <circle cx="300" cy="180" r="60" fill="none" stroke="#0feffd" stroke-width="2"/>
  <circle cx="300" cy="180" r="58" fill="rgba(15, 239, 253, 0.05)"/>
  
  <!-- Eyes -->
  <circle cx="275" cy="170" r="8" fill="none" stroke="#0feffd" stroke-width="1.5"/>
  <circle cx="325" cy="170" r="8" fill="none" stroke="#0feffd" stroke-width="1.5"/>
  
  <!-- Detection points -->
  <circle cx="275" cy="170" r="2" fill="#0feffd"/>
  <circle cx="325" cy="170" r="2" fill="#0feffd"/>
  <circle cx="300" cy="200" r="2" fill="#0feffd"/>
  <circle cx="285" cy="210" r="2" fill="#0feffd"/>
  <circle cx="315" cy="210" r="2" fill="#0feffd"/>
  
  <!-- Detection lines -->
  <line x1="275" y1="170" x2="325" y2="170" stroke="#0feffd" stroke-width="1" opacity="0.5"/>
  <line x1="275" y1="170" x2="300" y2="200" stroke="#0feffd" stroke-width="1" opacity="0.5"/>
  <line x1="325" y1="170" x2="300" y2="200" stroke="#0feffd" stroke-width="1" opacity="0.5"/>
  <line x1="300" y1="200" x2="285" y2="210" stroke="#0feffd" stroke-width="1" opacity="0.5"/>
  <line x1="300" y1="200" x2="315" y2="210" stroke="#0feffd" stroke-width="1" opacity="0.5"/>
  
  <!-- Scanning animation -->
  <rect x="175" y="190" width="250" height="2" fill="#0feffd" opacity="0.7">
    <animate attributeName="y" from="100" to="300" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Title -->
  <text x="180" y="330" fill="#e0f7ff" font-family="Arial" font-size="16" font-weight="bold">LIVELINESS DETECTOR</text>
  <text x="180" y="355" fill="#8c9eff" font-family="Arial" font-size="12">FACE RECOGNITION SYSTEM</text>
  
  <!-- Data display -->
  <rect x="450" y="120" width="120" height="160" fill="none" stroke="#0feffd" stroke-width="1" rx="2"/>
  <text x="460" y="140" fill="#0feffd" font-family="monospace" font-size="10">STATUS: SCANNING</text>
  <text x="460" y="160" fill="#0feffd" font-family="monospace" font-size="10">MATCH: 98.7%</text>
  <text x="460" y="180" fill="#0feffd" font-family="monospace" font-size="10">REAL: TRUE</text>
  <text x="460" y="200" fill="#0feffd" font-family="monospace" font-size="10">SPOOF: FALSE</text>
  <text x="460" y="220" fill="#0feffd" font-family="monospace" font-size="10">CONF: 0.987</text>
  
  <!-- Circuit decoration -->
  <path d="M30,200 L150,200" stroke="#0feffd" stroke-width="1" opacity="0.3"/>
  <path d="M450,300 L570,300" stroke="#0feffd" stroke-width="1" opacity="0.3"/>
</svg> 