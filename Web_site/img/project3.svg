<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1030"/>
      <stop offset="100%" stop-color="#070b1a"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0feffd"/>
      <stop offset="100%" stop-color="#aa00ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0feffd" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0feffd" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>
  
  <!-- Quantum circuit representation -->
  <g transform="translate(100, 100)">
    <!-- Quantum circuit wires -->
    <line x1="0" y1="0" x2="400" y2="0" stroke="#0feffd" stroke-width="1"/>
    <line x1="0" y1="50" x2="400" y2="50" stroke="#0feffd" stroke-width="1"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#0feffd" stroke-width="1"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#0feffd" stroke-width="1"/>
    
    <!-- Quantum gates -->
    <!-- H gates -->
    <rect x="50" y="-10" width="20" height="20" fill="none" stroke="#0feffd" stroke-width="1"/>
    <text x="54" y="5" fill="#0feffd" font-family="monospace" font-size="14">H</text>
    
    <rect x="50" y="40" width="20" height="20" fill="none" stroke="#0feffd" stroke-width="1"/>
    <text x="54" y="55" fill="#0feffd" font-family="monospace" font-size="14">H</text>
    
    <!-- CNOT gate -->
    <line x1="100" y1="50" x2="100" y2="0" stroke="#0feffd" stroke-width="1"/>
    <circle cx="100" cy="0" r="5" fill="#0feffd"/>
    <circle cx="100" cy="50" r="5" fill="none" stroke="#0feffd" stroke-width="1"/>
    <line x1="95" y1="50" x2="105" y2="50" stroke="#0feffd" stroke-width="1"/>
    
    <!-- X gate -->
    <rect x="150" y="90" width="20" height="20" fill="none" stroke="#0feffd" stroke-width="1"/>
    <text x="154" y="105" fill="#0feffd" font-family="monospace" font-size="14">X</text>
    
    <!-- CNOT gate -->
    <line x1="200" y1="100" x2="200" y2="150" stroke="#0feffd" stroke-width="1"/>
    <circle cx="200" cy="100" r="5" fill="#0feffd"/>
    <circle cx="200" cy="150" r="5" fill="none" stroke="#0feffd" stroke-width="1"/>
    <line x1="195" y1="150" x2="205" y2="150" stroke="#0feffd" stroke-width="1"/>
    
    <!-- Measurement -->
    <rect x="250" y="-10" width="20" height="20" fill="none" stroke="#0feffd" stroke-width="1"/>
    <path d="M255,0 L265,0 M260,-5 L260,5" stroke="#0feffd" stroke-width="1"/>
    
    <rect x="250" y="40" width="20" height="20" fill="none" stroke="#0feffd" stroke-width="1"/>
    <path d="M255,50 L265,50 M260,45 L260,55" stroke="#0feffd" stroke-width="1"/>
    
    <rect x="250" y="90" width="20" height="20" fill="none" stroke="#0feffd" stroke-width="1"/>
    <path d="M255,100 L265,100 M260,95 L260,105" stroke="#0feffd" stroke-width="1"/>
    
    <rect x="250" y="140" width="20" height="20" fill="none" stroke="#0feffd" stroke-width="1"/>
    <path d="M255,150 L265,150 M260,145 L260,155" stroke="#0feffd" stroke-width="1"/>
    
    <!-- Quantum state visualization -->
    <g transform="translate(310, 75)">
      <circle cx="0" cy="0" r="40" fill="url(#glow)" opacity="0.5"/>
      <circle cx="0" cy="0" r="2" fill="#0feffd"/>
      
      <!-- Bloch sphere representation -->
      <circle cx="0" cy="0" r="30" fill="none" stroke="#0feffd" stroke-width="0.5" opacity="0.7"/>
      <line x1="-30" y1="0" x2="30" y2="0" stroke="#0feffd" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="-30" x2="0" y2="30" stroke="#0feffd" stroke-width="0.5" opacity="0.3"/>
      
      <!-- State vector -->
      <line x1="0" y1="0" x2="15" y2="25" stroke="#aa00ff" stroke-width="1.5"/>
      <circle cx="15" cy="25" r="3" fill="#aa00ff"/>
      
      <!-- Animated rotation -->
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 0 0"
        to="360 0 0"
        dur="10s"
        repeatCount="indefinite"/>
    </g>
  </g>
  
  <!-- Title -->
  <text x="180" y="340" fill="#e0f7ff" font-family="Arial" font-size="20" font-weight="bold">QUANTUM SIMULATOR</text>
  <text x="150" y="365" fill="#8c9eff" font-family="Arial" font-size="12">INTERACTIVE VISUALIZATION PLATFORM</text>
</svg> 