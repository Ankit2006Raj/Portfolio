<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1e4a"/>
      <stop offset="100%" stop-color="#070b1a"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0feffd"/>
      <stop offset="100%" stop-color="#aa00ff"/>
    </linearGradient>
    <radialGradient id="brain-glow" cx="50%" cy="40%" r="50%" fx="50%" fy="40%">
      <stop offset="0%" stop-color="#aa00ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0feffd" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>
  
  <!-- Neural network visualization -->
  <g transform="translate(100, 80)">
    <!-- Brain glow -->
    <ellipse cx="200" cy="120" rx="180" ry="120" fill="url(#brain-glow)" opacity="0.5"/>
    
    <!-- Nodes and connections (simplified neural network) -->
    <!-- Input layer -->
    <circle cx="80" cy="60" r="10" fill="#0feffd" opacity="0.7"/>
    <circle cx="80" cy="120" r="10" fill="#0feffd" opacity="0.7"/>
    <circle cx="80" cy="180" r="10" fill="#0feffd" opacity="0.7"/>
    
    <!-- Hidden layer 1 -->
    <circle cx="200" cy="40" r="10" fill="#0feffd" opacity="0.7"/>
    <circle cx="200" cy="100" r="10" fill="#0feffd" opacity="0.7"/>
    <circle cx="200" cy="160" r="10" fill="#0feffd" opacity="0.7"/>
    <circle cx="200" cy="220" r="10" fill="#0feffd" opacity="0.7"/>
    
    <!-- Output layer -->
    <circle cx="320" cy="90" r="10" fill="#0feffd" opacity="0.7"/>
    <circle cx="320" cy="150" r="10" fill="#0feffd" opacity="0.7"/>
    
    <!-- Connections -->
    <!-- Input to hidden connections -->
    <line x1="80" y1="60" x2="200" y2="40" stroke="url(#highlight)" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="60" x2="200" y2="100" stroke="url(#highlight)" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="60" x2="200" y2="160" stroke="url(#highlight)" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="120" x2="200" y2="40" stroke="url(#highlight)" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="120" x2="200" y2="100" stroke="url(#highlight)" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="120" x2="200" y2="160" stroke="url(#highlight)" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="120" x2="200" y2="220" stroke="url(#highlight)" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="180" x2="200" y2="100" stroke="url(#highlight)" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="180" x2="200" y2="160" stroke="url(#highlight)" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="180" x2="200" y2="220" stroke="url(#highlight)" stroke-width="1" opacity="0.5"/>
    
    <!-- Hidden to output connections -->
    <line x1="200" y1="40" x2="320" y2="90" stroke="url(#highlight)" stroke-width="1" opacity="0.5"/>
    <line x1="200" y1="100" x2="320" y2="90" stroke="url(#highlight)" stroke-width="1" opacity="0.5"/>
    <line x1="200" y1="100" x2="320" y2="150" stroke="url(#highlight)" stroke-width="1" opacity="0.5"/>
    <line x1="200" y1="160" x2="320" y2="90" stroke="url(#highlight)" stroke-width="1" opacity="0.5"/>
    <line x1="200" y1="160" x2="320" y2="150" stroke="url(#highlight)" stroke-width="1" opacity="0.5"/>
    <line x1="200" y1="220" x2="320" y2="150" stroke="url(#highlight)" stroke-width="1" opacity="0.5"/>
    
    <!-- Data pulse animation on connections -->
    <circle cx="0" cy="0" r="3" fill="#0feffd">
      <animateMotion path="M80,60 L200,40" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="3" fill="#0feffd">
      <animateMotion path="M80,120 L200,160" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="3" fill="#0feffd">
      <animateMotion path="M200,100 L320,90" dur="1.7s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Interface display panel -->
  <rect x="425" y="100" width="150" height="200" fill="rgba(15, 239, 253, 0.05)" stroke="#0feffd" stroke-width="1" rx="5"/>
  <text x="450" y="130" fill="#0feffd" font-family="monospace" font-size="12">NEURAL INTERFACE</text>
  <line x1="430" y1="140" x2="570" y2="140" stroke="#0feffd" stroke-width="1" opacity="0.5"/>
  
  <text x="435" y="160" fill="#e0f7ff" font-family="monospace" font-size="10">STATUS: ACTIVE</text>
  <text x="435" y="180" fill="#e0f7ff" font-family="monospace" font-size="10">USERS: 1</text>
  <text x="435" y="200" fill="#e0f7ff" font-family="monospace" font-size="10">PREDICTION: 94.2%</text>
  <text x="435" y="220" fill="#e0f7ff" font-family="monospace" font-size="10">LATENCY: 12ms</text>
  <text x="435" y="240" fill="#e0f7ff" font-family="monospace" font-size="10">ADAPTING: TRUE</text>
  
  <!-- Title -->
  <text x="150" y="340" fill="#e0f7ff" font-family="Arial" font-size="20" font-weight="bold">NEURAL INTERFACE</text>
  <text x="145" y="365" fill="#8c9eff" font-family="Arial" font-size="12">ADAPTIVE UI SYSTEM</text>
</svg> 